services:
  postgres:
    image: postgres:16-alpine
    container_name: solarpunk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: solarpunk
      POSTGRES_PASSWORD: solarpunk
      POSTGRES_DB: solarpunk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarpunk -d solarpunk"]
      interval: 3s
      timeout: 3s
      retries: 10

  # PgBouncer in transaction-pooling mode (Step 7). Runtime queries from
  # Next.js hit :6432 and are multiplexed onto a tiny pool of upstream
  # Postgres connections, which is what Prisma's globalThis singleton
  # would otherwise expand to one-per-Lambda in production.
  # Migrations bypass PgBouncer via DIRECT_URL (port 5432) because Prisma
  # migrations rely on session-level state PgBouncer doesn't preserve.
  # In production, the same /lib/prisma.ts code works against a Prisma
  # Accelerate URL with zero changes.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: solarpunk-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: solarpunk
      DB_PASSWORD: solarpunk
      DB_NAME: solarpunk
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "10"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"

volumes:
  postgres-data:
